  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr Good Restaurant</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2>Mr Good</h2>
  <a href="#menu">Menu</a>
  <a href="#cart">Order</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<header class="hero">
  <h1>Hot. Delicious. Fresh.</h1>
  <p>Bringing You Unforgettable Flavors</p>

  <div class="hero-buttons">
    <a href="#menu">View Menu</a>
    <a href="#cart">Order Now</a>
  </div>
</header>

<!-- MENU -->
<section id="menu" class="menu">
  <h2>Menu</h2>

  <!-- CATEGORY 1 -->
  <div class="menu-section">
    <h3>Rice Dishes</h3>

    <div class="food-container">

      <!-- ITEM -->
      <div class="food-item">
        <h4>Jellof rice</h4>
        <span>₦PRICE</span>
        <button onclick="addToCart('ITEM NAME HERE', PRICE)">Add</button>
      </div>

      <!-- DUPLICATE THIS BLOCK FOR ALL ITEMS -->

    </div>
  </div>

  <!-- CATEGORY 2 -->
  <div class="menu-section">
    <h3>Soups</h3>

    <div class="food-container">

      <div class="food-item">
        <h4>ITEM NAME HERE</h4>
        <span>₦PRICE</span>
        <button onclick="addToCart('ITEM NAME HERE', PRICE)">Add</button>
      </div>

    </div>
  </div>

  <!-- CATEGORY 3 -->
  <div class="menu-section">
    <h3>Snacks / Pastries</h3>

    <div class="food-container">

      <div class="food-item">
        <h4>ITEM NAME HERE</h4>
        <span>₦PRICE</span>
        <button onclick="addToCart('ITEM NAME HERE', PRICE)">Add</button>
      </div>

    </div>
  </div>

  <!-- ADD MORE CATEGORIES AS NEEDED -->

</section>

<!-- CART -->
<section id="cart" class="cart">
  <h2>Your Order</h2>

  <div id="cart-items"></div>

  <h3 id="total">Total: ₦0</h3>

  <button onclick="sendToWhatsApp()">
    Order on WhatsApp
  </button>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>📍 Lugbe, Abuja</p>
  <p>📞 09153792537</p>
</section>

</body>
</html>
